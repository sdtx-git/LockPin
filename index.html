<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LockPin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        height: 100%;
        width: 100%;
      }

      :root, [data-theme="dark"] {
        --bg-app: #060608;
        --bg-sidebar: linear-gradient(180deg, #09090f 0%, #07070d 100%);
        --bg-list: #0a0a0f;
        --bg-detail: #0c0c12;
        --bg-surface: rgba(255,255,255,0.025);
        --bg-surface-hover: rgba(255,255,255,0.045);
        --bg-input: rgba(255,255,255,0.04);
        --border-dim: rgba(255,255,255,0.05);
        --border-medium: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.12);
        --text-body: #e8e8e8;
        --text-strong: #d0d0d0;
        --text-secondary: #b0b0b0;
        --text-muted: #808080;
        --text-faint: #606060;
        --scrollbar-thumb: rgba(255,255,255,0.08);
        --scrollbar-hover: rgba(255,255,255,0.15);
        --shadow-profile: rgba(0,0,0,0.3);
      }

      [data-theme="light"] {
        --bg-app: #f0f2f8;
        --bg-sidebar: linear-gradient(180deg, #e6e8f2 0%, #e2e5ee 100%);
        --bg-list: #f4f6fc;
        --bg-detail: #fafbfe;
        --bg-surface: rgba(0,0,0,0.04);
        --bg-surface-hover: rgba(0,0,0,0.07);
        --bg-input: rgba(0,0,0,0.05);
        --border-dim: rgba(0,0,0,0.07);
        --border-medium: rgba(0,0,0,0.1);
        --border-strong: rgba(0,0,0,0.15);
        --text-body: #1a1a2e;
        --text-strong: #2a2a40;
        --text-secondary: #4a4a6a;
        --text-muted: #6a6a8a;
        --text-faint: #8a8aaa;
        --scrollbar-thumb: rgba(0,0,0,0.12);
        --scrollbar-hover: rgba(0,0,0,0.2);
        --shadow-profile: rgba(0,0,0,0.08);
      }

      body {
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        background: var(--bg-app);
        color: var(--text-body);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
      }

      /* Scrollbars */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

      /* Focus */
      button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
        outline: 2px solid #4f98a3;
        outline-offset: 2px;
        border-radius: 4px;
      }

      ::selection { background: rgba(79, 152, 163, 0.3); color: #fff; }

      /* Animations */
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes toast-in { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slide-in { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
      @keyframes bg-shift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }

      .animate-spin { animation: spin 0.8s linear infinite; }
      .animate-fade-up { animation: fade-up 0.25s ease forwards; }
      .animate-slide-in { animation: slide-in 0.2s ease forwards; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
